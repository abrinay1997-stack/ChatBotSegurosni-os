name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint:secrets
      - name: Check prompts for secrets
        run: |
          if grep -rE "sk-[a-zA-Z0-9]{10}|TELEGRAM_BOT_TOKEN=|GROQ_API_KEY=|GLM_API_KEY=" src/brain/prompts/; then
            echo "secrets encontrados en prompts"; exit 1
          else
            echo "no secrets en prompts"
          fi
